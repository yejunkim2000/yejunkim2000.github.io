<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
</head>
<body>

<nav>
  <a href="{{ '/' | relative_url }}" class="nav-logo">
    <span class="prompt">~$</span>
    yejunkim2000.github.io
    <span class="cursor"></span>
  </a>
  <ul class="nav-links">
    <li><a href="{{ '/' | relative_url }}">home</a></li>
    <li><a href="{{ '/posts' | relative_url }}">posts</a></li>
    <li><a href="{{ '/about' | relative_url }}">about</a></li>
    <li><a href="https://github.com/yejunkim2000" target="_blank">github</a></li>
  </ul>
</nav>

{{ content }}

<footer>
  <p>© 2026 yejunkim2000 · Built with Jekyll · <a href="https://github.com/yejunkim2000/yejunkim2000.github.io">source</a></p>
</footer>

</body>
</html>
