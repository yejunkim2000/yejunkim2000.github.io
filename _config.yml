title: "yejunkim2000's DevLog"
tagline: "보안 · 개발 · 연구를 기록하는 공간"
description: "개발, CTF/Wargame, Bug Bounty, 기술문서, 논문/컨퍼런스, 공모전/자격증을 다루는 기술 블로그"
url: "https://yejunkim2000.github.io"
baseurl: ""

author:
  name: "yejunkim2000"
  email: ""
  github: "yejunkim2000"

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

collections:
  posts:
    output: true

defaults:
  - scope:
      path: "_posts"
    values:
      layout: "post"
      permalink: /posts/:title/

categories:
  - name: "개발"
    slug: "dev"
    icon: "⌨"
    color: "blue"
  - name: "CTF/Wargame"
    slug: "ctf"
    icon: "⚑"
    color: "red"
  - name: "Bug Bounty"
    slug: "bugbounty"
    icon: "◎"
    color: "amber"
  - name: "블로그/기술문서"
    slug: "docs"
    icon: "✎"
    color: "teal"
  - name: "논문/컨퍼런스"
    slug: "research"
    icon: "◈"
    color: "purple"
  - name: "공모전/자격증"
    slug: "cert"
    icon: "★"
    color: "green"

exclude: ["sitemap.xml", "feed.xml", "LICENSE", "README.md", "Gemfile", "Gemfile.lock"]

kramdown:
  math_engine: null
  syntax_highlighter: rouge
